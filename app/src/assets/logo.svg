<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="60%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <radialGradient id="sweepGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Bold Security Shield -->
  <path d="M 256 70 C 340 70, 384 92, 384 92 C 384 228, 350 342, 256 414 C 162 342, 128 228, 128 92 C 128 92, 172 70, 256 70 Z" 
        fill="none" stroke="url(#shieldGrad)" stroke-width="16" stroke-linejoin="round" filter="url(#glow)" />

  <!-- Single Clean Sonar Ring -->
  <circle cx="256" cy="225" r="85" fill="none" stroke="#38bdf8" stroke-width="6" stroke-dasharray="7 7" opacity="0.8" />

  <!-- Radar Beam Sweep Arc -->
  <path d="M 256 225 L 316 165 A 85 85 0 0 0 256 140 Z" fill="url(#sweepGrad)" />
  <line x1="256" y1="225" x2="316" y2="165" stroke="#22d3ee" stroke-width="6" stroke-linecap="round" filter="url(#glow)" />

  <!-- Single Focal Red Target Lock Point -->
  <circle cx="300" cy="180" r="11" fill="#f43f5e" filter="url(#glow)" />

  <!-- Center Axis Point -->
  <circle cx="256" cy="225" r="8" fill="#38bdf8" />
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGradB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#030712" />
    </linearGradient>
    <linearGradient id="neonCyanB" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    <filter id="glowB" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bgGradB)" stroke="#38bdf8" stroke-width="6" />
  
  <!-- Outer Trawl Mesh Polygon -->
  <polygon points="256,80 380,150 380,310 256,380 132,310 132,150" fill="none" stroke="url(#neonCyanB)" stroke-width="8" stroke-linejoin="round" filter="url(#glowB)" />
  
  <!-- Inner Concentric Mesh Grid -->
  <polygon points="256,130 330,175 330,285 256,330 182,285 182,175" fill="none" stroke="#22d3ee" stroke-width="4" stroke-opacity="0.8" />
  <polygon points="256,180 290,200 290,260 256,280 222,260 222,200" fill="none" stroke="#67e8f9" stroke-width="3" stroke-opacity="0.9" />
  
  <!-- Mesh Node Radiating Connecting Rays -->
  <line x1="256" y1="80" x2="256" y2="180" stroke="#0284c7" stroke-width="3" />
  <line x1="380" y1="150" x2="290" y2="200" stroke="#0284c7" stroke-width="3" />
  <line x1="380" y1="310" x2="290" y2="260" stroke="#0284c7" stroke-width="3" />
  <line x1="256" y1="380" x2="256" y2="280" stroke="#0284c7" stroke-width="3" />
  <line x1="132" y1="310" x2="222" y2="260" stroke="#0284c7" stroke-width="3" />
  <line x1="132" y1="150" x2="222" y2="200" stroke="#0284c7" stroke-width="3" />

  <!-- Active Scan Pulse Points -->
  <circle cx="256" cy="80" r="7" fill="#38bdf8" filter="url(#glowB)" />
  <circle cx="380" cy="150" r="7" fill="#38bdf8" filter="url(#glowB)" />
  <circle cx="380" cy="310" r="7" fill="#38bdf8" filter="url(#glowB)" />
  <circle cx="256" cy="380" r="7" fill="#38bdf8" filter="url(#glowB)" />
  <circle cx="132" cy="310" r="7" fill="#38bdf8" filter="url(#glowB)" />
  <circle cx="132" cy="150" r="7" fill="#38bdf8" filter="url(#glowB)" />
  
  <!-- Central Pulse Nucleus -->
  <circle cx="256" cy="230" r="16" fill="#f43f5e" filter="url(#glowB)" />
  <circle cx="256" cy="230" r="28" fill="none" stroke="#fb7185" stroke-width="4" opacity="0.8" />
</svg>
